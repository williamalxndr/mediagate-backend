name: CI

on:
  push:
    branches-ignore: []
  pull_request:

jobs:
  lint:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy .

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DEBUG: "True"
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/secure_media
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_STORAGE_BUCKET_NAME: dummy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest apps/ -m "not integration" --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage.xml
          retention-days: 7

  artifact:
    name: Build Artifact Check
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/secure_media
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_STORAGE_BUCKET_NAME: dummy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install production dependencies
        run: pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check --deploy --settings config.settings.production
        env:
          DJANGO_SECRET_KEY: ci-secret-key
          ALLOWED_HOSTS: localhost
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/secure_media
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          AWS_STORAGE_BUCKET_NAME: dummy

      - name: Collect static files
        run: python manage.py collectstatic --noinput --settings config.settings.production
        env:
          DJANGO_SECRET_KEY: ci-secret-key
          ALLOWED_HOSTS: localhost
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/secure_media
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          AWS_STORAGE_BUCKET_NAME: dummy

      - name: Upload staticfiles
        uses: actions/upload-artifact@v4
        with:
          name: staticfiles
          path: staticfiles/
          retention-days: 7
