name: CI (Full)

on:
  pull_request:
    branches:
      - master
      - staging

jobs:
  lint:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy .

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DEBUG: "True"
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/secure_media
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_STORAGE_BUCKET_NAME: dummy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest apps/ -m "not integration" --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage.xml
          retention-days: 14

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: secure_media
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DEBUG: "True"
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/secure_media
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      AWS_STORAGE_BUCKET_NAME: dummy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run migrations
        run: python manage.py migrate

      - name: Run integration tests
        run: pytest apps/ -m "integration" --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage.xml
          retention-days: 14

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Bandit (SAST)
        run: bandit -r . -x ./apps/core/migrations,./apps/access/tests,./apps/events/tests,./apps/content/tests,./apps/core/tests -ll

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit -r requirements.txt

  artifact:
    name: Build Artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install production dependencies
        run: pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check --deploy --settings config.settings.production
        env:
          DJANGO_SECRET_KEY: ci-secret-key
          ALLOWED_HOSTS: localhost
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/secure_media
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          AWS_STORAGE_BUCKET_NAME: dummy

      - name: Collect static files
        run: python manage.py collectstatic --noinput --settings config.settings.production
        env:
          DJANGO_SECRET_KEY: ci-secret-key
          ALLOWED_HOSTS: localhost
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/secure_media
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          AWS_STORAGE_BUCKET_NAME: dummy

      - name: Upload staticfiles
        uses: actions/upload-artifact@v4
        with:
          name: staticfiles
          path: staticfiles/
          retention-days: 14
